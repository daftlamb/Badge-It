<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge It</title>
  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --panel: #1a1a1a;
      --border: #2a2a2a;
      --text: #ffffff;
      --muted: #888888;
      --accent: #e07820;
      --font: 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    #header .logo {
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
    }

    #header .logo span {
      color: var(--text);
    }

    #btn-coffee {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    #btn-coffee:hover { opacity: 0.85; }

    /* ── Layout ── */
    #app {
      display: flex;
      height: 100vh;
      padding-top: 48px;
    }

    /* ── Left Panel ── */
    #panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      display: block;
      margin-bottom: 4px;
    }

    select, input[type="color"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 6px 8px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      border-radius: 2px;
    }

    select:focus { outline: 1px solid var(--accent); }

    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 11px;
    }

    input[type="color"] {
      padding: 2px 4px;
      height: 32px;
      cursor: pointer;
    }

    /* Slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      background: #f08930;
    }

    .slider-val {
      font-size: 11px;
      color: var(--muted);
      min-width: 28px;
      text-align: right;
    }

    /* Buttons */
    .btn {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 12px;
      cursor: pointer;
      text-align: left;
      border-radius: 2px;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover {
      border-color: var(--accent);
      background: #1e1e1e;
    }

    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      text-align: center;
    }
    .btn-accent:hover {
      background: #f08930;
      border-color: #f08930;
    }

    .btn-danger {
      border-color: #553333;
      color: #cc6666;
    }
    .btn-danger:hover {
      border-color: #cc6666;
      background: #1e1515;
    }

    #svg-filename {
      font-size: 10px;
      color: var(--muted);
      font-style: italic;
      min-height: 14px;
      word-break: break-all;
    }

    /* ── Canvas area ── */
    #canvas-area {
      flex: 1;
      background: #f5f5f5;
      position: relative;
      overflow: hidden;
    }

    #canvas-area canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 10px;
      color: #999;
      font-family: var(--font);
      letter-spacing: 1px;
      pointer-events: none;
    }

    /* hide the real file input */
    #svg-input { display: none; }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    .light-grid {
      display: grid;
      grid-template-columns: 40px 1fr 32px;
      align-items: center;
      gap: 6px 8px;
    }
    .light-grid label {
      margin: 0;
      font-size: 10px;
    }
  </style>
</head>
<body>

<!-- Header -->
<header id="header">
  <div class="logo">Badge<span> It</span></div>
  <button id="btn-coffee">☕ Buy Me a Coffee</button>
</header>

<!-- App Layout -->
<div id="app">

  <!-- Left Control Panel -->
  <aside id="panel">

    <!-- Shape -->
    <div class="section">
      <div class="section-title">Shape</div>
      <div class="field-group">
        <label>Badge Shape</label>
        <div class="select-wrapper">
          <select id="sel-shape">
            <option value="circle" selected>Circle</option>
            <option value="shield">Shield</option>
            <option value="hexagon">Hexagon</option>
            <option value="square">Square</option>
            <option value="pentagon">Pentagon</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Design -->
    <div class="section">
      <div class="section-title">Design</div>

      <div class="field-group">
        <label>SVG Artwork</label>
        <input type="file" id="svg-input" accept=".svg" />
        <button class="btn" id="btn-upload-svg">↑ Upload SVG File</button>
        <div id="svg-filename">No file selected</div>
        <button class="btn btn-danger" id="btn-clear-svg">✕ Clear SVG</button>
      </div>

      <div class="field-group">
        <label>Badge Base Color</label>
        <input type="color" id="color-base" value="#e8e8e8" />
      </div>
    </div>

    <!-- Material -->
    <div class="section">
      <div class="section-title">Material</div>

      <div class="field-group">
        <label>Material Type</label>
        <div class="select-wrapper">
          <select id="sel-material">
            <option value="metal" selected>Metal</option>
            <option value="enamel">Enamel</option>
            <option value="matte">Matte</option>
            <option value="plastic">Plastic</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Metalness</label>
        <div class="slider-row">
          <input type="range" id="sl-metalness" min="0" max="1" step="0.01" value="0.9" />
          <span class="slider-val" id="val-metalness">0.90</span>
        </div>
      </div>

      <div class="field-group">
        <label>Roughness</label>
        <div class="slider-row">
          <input type="range" id="sl-roughness" min="0" max="1" step="0.01" value="0.2" />
          <span class="slider-val" id="val-roughness">0.20</span>
        </div>
      </div>
    </div>

    <!-- Light -->
    <div class="section">
      <div class="section-title">Light</div>

      <div class="field-group">
        <label>Ambient Intensity</label>
        <div class="slider-row">
          <input type="range" id="sl-ambient" min="0" max="2" step="0.01" value="0.5" />
          <span class="slider-val" id="val-ambient">0.50</span>
        </div>
      </div>

      <div class="light-grid">
        <label>DIR X</label>
        <input type="range" id="sl-lx" min="-10" max="10" step="0.1" value="3" />
        <span class="slider-val" id="val-lx">3.0</span>

        <label>DIR Y</label>
        <input type="range" id="sl-ly" min="-10" max="10" step="0.1" value="5" />
        <span class="slider-val" id="val-ly">5.0</span>

        <label>DIR Z</label>
        <input type="range" id="sl-lz" min="-10" max="10" step="0.1" value="4" />
        <span class="slider-val" id="val-lz">4.0</span>
      </div>
    </div>

    <!-- Export -->
    <div class="section">
      <div class="section-title">Export</div>
      <button class="btn btn-accent" id="btn-export">↓ Download PNG</button>
    </div>

  </aside>

  <!-- 3D Canvas Area -->
  <div id="canvas-area">
    <div class="hint">Drag to rotate · Scroll to zoom</div>
  </div>

</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── State ──────────────────────────────────────────────────────────────────
let currentShape = 'circle';
let currentMaterial = 'metal';
let baseColor = '#e8e8e8';
let svgString = null;
let svgTexture = null;
let badge = null;
let autoRotate = true;

// ── Renderer / Scene / Camera ──────────────────────────────────────────────
const canvasArea = document.getElementById('canvas-area');

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true,
  preserveDrawingBuffer: true,
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(canvasArea.clientWidth, canvasArea.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.setClearColor(0xf5f5f5, 1);
canvasArea.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, canvasArea.clientWidth / canvasArea.clientHeight, 0.1, 100);
camera.position.set(0, 0.5, 4);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.minPolarAngle = Math.PI * 0.1;
controls.maxPolarAngle = Math.PI * 0.75;
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 2;
controls.maxDistance = 8;

// ── Lights ─────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
dirLight.position.set(3, 5, 4);
dirLight.castShadow = true;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8899cc, 0.4);
fillLight.position.set(-3, -2, 2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffeedd, 0.3);
rimLight.position.set(0, -3, -4);
scene.add(rimLight);

// ── Material presets ───────────────────────────────────────────────────────
const materialPresets = {
  metal:   { metalness: 0.9, roughness: 0.2 },
  enamel:  { metalness: 0.3, roughness: 0.1 },
  matte:   { metalness: 0.0, roughness: 0.9 },
  plastic: { metalness: 0.1, roughness: 0.3 },
};

// ── Geometry builders ──────────────────────────────────────────────────────
function buildGeometry(shape) {
  switch (shape) {
    case 'circle':
      return new THREE.CylinderGeometry(1, 1, 0.12, 64);
    case 'hexagon':
      return new THREE.CylinderGeometry(1, 1, 0.12, 6);
    case 'pentagon':
      return new THREE.CylinderGeometry(1, 1, 0.12, 5);
    case 'square':
      return new THREE.BoxGeometry(1.8, 1.8, 0.12);
    case 'shield':
      return buildShieldGeometry();
    default:
      return new THREE.CylinderGeometry(1, 1, 0.12, 64);
  }
}

function buildShieldGeometry() {
  const shape = new THREE.Shape();
  // Shield path (normalised to ~[-1,1])
  shape.moveTo(0, 1.1);
  shape.lineTo(-1.0, 0.6);
  shape.lineTo(-1.0, -0.2);
  shape.bezierCurveTo(-1.0, -0.8, -0.5, -1.1, 0, -1.3);
  shape.bezierCurveTo(0.5, -1.1, 1.0, -0.8, 1.0, -0.2);
  shape.lineTo(1.0, 0.6);
  shape.closePath();

  const extrudeSettings = {
    depth: 0.12,
    bevelEnabled: true,
    bevelThickness: 0.02,
    bevelSize: 0.025,
    bevelSegments: 4,
  };
  const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  geo.center();
  // Rotate so the flat face points up (Y+) like a cylinder
  geo.rotateX(-Math.PI / 2);
  return geo;
}

// ── SVG → Texture ──────────────────────────────────────────────────────────
function svgToTexture(svgStr, color) {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, 512, 512);
      ctx.drawImage(img, 0, 0, 512, 512);
      URL.revokeObjectURL(url);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      resolve(tex);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      resolve(null);
    };
    img.src = url;
  });
}

function solidColorTexture(color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 64, 64);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ── Badge builder ──────────────────────────────────────────────────────────
async function rebuildBadge() {
  // Remove old badge
  if (badge) {
    scene.remove(badge);
    badge.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
    badge = null;
  }

  const preset = materialPresets[currentMaterial];
  const metalness = parseFloat(document.getElementById('sl-metalness').value);
  const roughness = parseFloat(document.getElementById('sl-roughness').value);

  const geo = buildGeometry(currentShape);

  // Top face texture
  let topTex;
  if (svgString) {
    topTex = await svgToTexture(svgString, baseColor);
    svgTexture = topTex;
  } else {
    topTex = solidColorTexture(baseColor);
  }

  const sideMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(baseColor),
    metalness,
    roughness,
  });

  const topMat = new THREE.MeshStandardMaterial({
    map: topTex,
    metalness,
    roughness,
  });

  const bottomMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(baseColor),
    metalness,
    roughness,
  });

  let mesh;
  if (currentShape === 'square') {
    // BoxGeometry: 6 faces, we want top (index 2 = +Y) to have texture
    // BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z
    const mats = [sideMat, sideMat, topMat, bottomMat, sideMat, sideMat];
    mesh = new THREE.Mesh(geo, mats);
  } else if (currentShape === 'shield') {
    // ExtrudeGeometry: 2 groups (front=0, back=1, sides=2 if beveled)
    // We'll use a single material group approach for shield
    const shieldTopMat = new THREE.MeshStandardMaterial({
      map: topTex,
      metalness,
      roughness,
    });
    mesh = new THREE.Mesh(geo, [shieldTopMat, sideMat]);
  } else {
    // CylinderGeometry: group 0=side, group 1=top (+Y), group 2=bottom (-Y)
    const mats = [sideMat, topMat, bottomMat];
    mesh = new THREE.Mesh(geo, mats);
  }

  mesh.castShadow = true;
  mesh.receiveShadow = true;
  badge = mesh;
  scene.add(badge);
}

// ── Update only material props (no geometry rebuild) ──────────────────────
function updateMaterialProps() {
  if (!badge) return;
  const metalness = parseFloat(document.getElementById('sl-metalness').value);
  const roughness = parseFloat(document.getElementById('sl-roughness').value);

  const mats = Array.isArray(badge.material) ? badge.material : [badge.material];
  mats.forEach(m => {
    m.metalness = metalness;
    m.roughness = roughness;
    m.needsUpdate = true;
  });
}

// ── Animate ────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (badge && autoRotate) {
    badge.rotation.y += 0.002;
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Resize ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = canvasArea.clientWidth;
  const h = canvasArea.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

// ── UI Wiring ─────────────────────────────────────────────────────────────

// Shape
document.getElementById('sel-shape').addEventListener('change', e => {
  currentShape = e.target.value;
  rebuildBadge();
});

// SVG Upload
document.getElementById('btn-upload-svg').addEventListener('click', () => {
  document.getElementById('svg-input').click();
});

document.getElementById('svg-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('svg-filename').textContent = file.name;
  const reader = new FileReader();
  reader.onload = evt => {
    svgString = evt.target.result;
    rebuildBadge();
  };
  reader.readAsText(file);
});

// Clear SVG
document.getElementById('btn-clear-svg').addEventListener('click', () => {
  svgString = null;
  svgTexture = null;
  document.getElementById('svg-input').value = '';
  document.getElementById('svg-filename').textContent = 'No file selected';
  rebuildBadge();
});

// Base color
document.getElementById('color-base').addEventListener('input', e => {
  baseColor = e.target.value;
  rebuildBadge();
});

// Material preset
document.getElementById('sel-material').addEventListener('change', e => {
  currentMaterial = e.target.value;
  const preset = materialPresets[currentMaterial];
  document.getElementById('sl-metalness').value = preset.metalness;
  document.getElementById('sl-roughness').value = preset.roughness;
  document.getElementById('val-metalness').textContent = preset.metalness.toFixed(2);
  document.getElementById('val-roughness').textContent = preset.roughness.toFixed(2);
  updateMaterialProps();
});

// Metalness slider
document.getElementById('sl-metalness').addEventListener('input', e => {
  document.getElementById('val-metalness').textContent = parseFloat(e.target.value).toFixed(2);
  updateMaterialProps();
});

// Roughness slider
document.getElementById('sl-roughness').addEventListener('input', e => {
  document.getElementById('val-roughness').textContent = parseFloat(e.target.value).toFixed(2);
  updateMaterialProps();
});

// Ambient light
document.getElementById('sl-ambient').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('val-ambient').textContent = v.toFixed(2);
  ambientLight.intensity = v;
});

// Dir light X/Y/Z
document.getElementById('sl-lx').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('val-lx').textContent = v.toFixed(1);
  dirLight.position.x = v;
});
document.getElementById('sl-ly').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('val-ly').textContent = v.toFixed(1);
  dirLight.position.y = v;
});
document.getElementById('sl-lz').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('val-lz').textContent = v.toFixed(1);
  dirLight.position.z = v;
});

// Export PNG
document.getElementById('btn-export').addEventListener('click', () => {
  // Render at 3x resolution
  const w = canvasArea.clientWidth;
  const h = canvasArea.clientHeight;
  renderer.setPixelRatio(window.devicePixelRatio * 3);
  renderer.setSize(w, h, false);
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = 'badge.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
  // Restore
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(w, h, false);
});

// Coffee button
document.getElementById('btn-coffee').addEventListener('click', () => {
  alert('☕ 感谢支持！支付宝付款功能即将上线～');
});

// Pause auto-rotate on user interaction
controls.addEventListener('start', () => { autoRotate = false; });
controls.addEventListener('end', () => {
  // Resume after 3s of inactivity
  setTimeout(() => { autoRotate = true; }, 3000);
});

// ── Init ───────────────────────────────────────────────────────────────────
rebuildBadge();
</script>
</body>
</html>
