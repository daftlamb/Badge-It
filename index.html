<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Badge-It 3D</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;color:#ccc;font-family:monospace;display:flex;height:100vh;overflow:hidden;}
:root{
  --panel:#1c1c1c;
  --border:#333;
  --accent:#5af;
  --btn:#2a2a2a;
  --btn-hover:#3a3a3a;
}
#panel{
  width:220px;min-width:220px;max-width:220px;
  background:var(--panel);
  display:flex;flex-direction:column;
  overflow-y:auto;border-right:1px solid var(--border);
  font-size:11px;
}
#panel::-webkit-scrollbar{width:4px;}
#panel::-webkit-scrollbar-thumb{background:#444;}
.panel-section{padding:10px;border-bottom:1px solid var(--border);}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:8px;}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.row label{color:#aaa;flex:1;}
.row .val{color:var(--accent);min-width:32px;text-align:right;font-size:10px;}
input[type=range]{width:100%;accent-color:var(--accent);}
input[type=color]{width:28px;height:20px;border:none;background:none;cursor:pointer;padding:0;}
select{background:#2a2a2a;color:#ccc;border:1px solid var(--border);padding:2px 4px;font-size:11px;width:100%;}
.btn{
  background:var(--btn);border:1px solid var(--border);
  color:#ccc;padding:4px 8px;font-size:10px;cursor:pointer;
  border-radius:2px;
}
.btn:hover{background:var(--btn-hover);}
.btn.active{background:#2a4a6a;border-color:var(--accent);}
.btn-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.shape-btn{flex:1;min-width:30px;text-align:center;}
#upload-zone{
  border:2px dashed var(--border);
  width:100%;height:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;border-radius:4px;
  transition:border-color 0.2s;
  margin-bottom:6px;
}
#upload-zone:hover{border-color:var(--accent);}
#upload-zone .plus{font-size:36px;line-height:1;color:#666;}
#upload-zone .hint{font-size:9px;color:#555;margin-top:4px;}
#canvas-wrap{flex:1;position:relative;background:#111;overflow:hidden;}
#canvas-wrap canvas{display:block;}
#caption-overlay{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;
}
#caption-overlay #caption-name{font-size:18px;font-weight:bold;color:#eee;text-shadow:0 0 8px #000;}
#caption-overlay #caption-copy{font-size:11px;color:#aaa;text-shadow:0 0 4px #000;}
#toolbar{
  position:absolute;top:8px;right:8px;display:flex;gap:6px;
}
#toolbar button{
  background:rgba(30,30,30,0.85);border:1px solid #444;
  color:#ccc;padding:4px 10px;font-size:10px;cursor:pointer;border-radius:2px;
}
#toolbar button:hover{background:rgba(60,60,60,0.9);}
.hidden{display:none!important;}

/* ─── MOBILE ──────────────────────────────────────────── */
#mobile-toggle{display:none;}
#drawer-backdrop{display:none;}
@media(max-width:768px){
  /* Canvas full screen */
  #canvas-wrap{
    position:fixed;top:0;left:0;
    width:100vw;height:100vh;
    z-index:1;
    flex:none;
  }

  /* Hide desktop sidebar */
  #panel{
    position:fixed;bottom:0;left:0;right:0;
    width:100%!important;max-width:100%!important;min-width:0!important;
    height:70vh;
    border-right:none;border-top:1px solid #444;
    border-radius:14px 14px 0 0;
    z-index:50;
    transform:translateY(100%);
    transition:transform 0.3s ease;
    font-size:13px;
    overflow-y:auto;
  }
  #panel.open{transform:translateY(0);}

  /* Drag handle */
  #panel::before{
    content:'';display:block;
    width:40px;height:4px;
    background:#555;border-radius:2px;
    margin:12px auto 4px;
  }

  /* Backdrop */
  #drawer-backdrop{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.55);
    z-index:45;
    display:none;
  }
  #drawer-backdrop.open{display:block;}

  /* Controls toggle button */
  #mobile-toggle{
    display:flex!important;
    position:fixed;
    bottom:20px;left:50%;transform:translateX(-50%);
    z-index:55;
    background:#1c1c1cee;
    border:1px solid #555;
    color:#ddd;font-size:13px;font-family:monospace;
    padding:10px 28px;border-radius:24px;
    cursor:pointer;align-items:center;gap:8px;
    white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,0.6);
  }

  /* Reset cam button — visible above toggle */
  #toolbar{
    position:fixed;top:12px;right:12px;
    z-index:10;top:12px;
  }
  #toolbar button{font-size:11px;padding:6px 12px;}

  /* Touch-friendly controls */
  .row{margin-bottom:9px;}
  .panel-section{padding:12px 16px;}
  .section-title{font-size:11px;margin-bottom:10px;}
  .btn{padding:8px 12px;font-size:12px;border-radius:4px;}
  input[type=range]{height:26px;}
  select{padding:7px 8px;font-size:13px;}
  #upload-zone{height:90px;}
  #upload-zone .plus{font-size:44px;}
}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- LEFT PANEL -->
<div id="panel">

  <!-- UPLOAD -->

    <div class="section-title">Upload</div>
    <div id="upload-zone" onclick="document.getElementById('svg-input').click()">
      <div class="plus">+</div>

    <div class="section-title" style="margin-top:6px;">Shape Preset</div>
    <div class="btn-row">

    </div>

    </div>
    <div id="bevel-controls">
      <div class="row">
        <label>Thickness</label>

      </div>
      <input type="range" id="bevel-thickness" min="0.01" max="0.5" step="0.01" value="0.08"/>

  <!-- LAYERS -->
  <div class="panel-section">
    <div class="section-title">Layers (up to 6)</div>
    <div id="layer-list"></div>
    <button class="btn" id="btn-add-layer" style="width:100%;font-size:10px;margin-top:6px;">+ Add Layer</button>
    <div id="layer-path-map" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;">
      <!-- path→layer assignments for SVG -->

  <!-- MATERIAL -->
  <div class="panel-section">
    <div class="section-title">Material</div>
    <div class="row">
      <label>Matcap</label>
    </div>
    <select id="matcap-select" style="margin-bottom:6px;">
      <option value="none">none</option>
      <option value="chrome">chrome</option>

      <option value="bronze">bronze</option>

      <option value="blue_glass">blue glass</option>
    </select>
    <div class="row">

    <select id="normalmap-select" style="margin-bottom:6px;">

    <input type="range" id="normalmap-scale" min="0" max="3" step="0.05" value="1"/>
    <div class="row" style="margin-top:6px;">

      <span class="val" id="metalness-val">0.90</span>

    <input type="range" id="metalness" min="0" max="1" step="0.01" value="0.9"/>
    <div class="row">

  <!-- LIGHTING -->
  <div class="panel-section">
    <div class="section-title">Lighting</div>
    <div class="row">

    <select id="env-select" style="margin-bottom:6px;">
      <option value="none">no hdr</option>

    <div class="row">
      <label>Ambient</label>
      <span class="val" id="ambient-intensity-val">0.40</span>
    </div>
    <input type="range" id="ambient-intensity" min="0" max="3" step="0.05" value="0.4"/>
    <div class="row">
      <label>Spot Int.</label>

    <div class="row">

    </div>
    <input type="range" id="light-x" min="-10" max="10" step="0.1" value="5"/>
    <div class="row">
      <label>Light Y</label>
      <span class="val" id="light-y-val">8.00</span>
    </div>
    <input type="range" id="light-y" min="-10" max="10" step="0.1" value="8"/>
    <div class="row">

    </div>

  <!-- CANVAS -->
  <div class="panel-section">
    <div class="section-title">Canvas</div>
    <div class="row">
      <label>BG Color</label>

    </div>
    <div class="row" style="margin-top:4px;">
      <label>Auto-rotate</label>
      <input type="checkbox" id="auto-rotate-toggle" checked/>
    </div>
    <div class="row">
      <label>Perspective</label>

    <div class="row">
      <label>Preview</label>

  <!-- POST FX -->

  <!-- CAPTION -->

  <!-- EXPORT -->

<!-- MOBILE DRAWER CONTROLS -->
<div id="drawer-backdrop"></div>
<button id="mobile-toggle">⚙ Controls</button>

<!-- CANVAS AREA -->
<div id="canvas-wrap">
  <div id="caption-overlay">
    <div id="caption-name"></div>
    <div id="caption-copy"></div>
  </div>
  <div id="toolbar">
    <button id="btn-reset-cam">Reset Cam</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ─── MATCAP DATA (base64 embedded) ────────────────────────────────────────────
// Using small placeholder colors instead of large base64 for chrome/gold/etc.
// We'll load them dynamically from a tiny canvas if not provided
function makeMatcapTexture(colorHex) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const r = parseInt(colorHex.slice(1,3),16);
  const g = parseInt(colorHex.slice(3,5),16);
  const b = parseInt(colorHex.slice(5,7),16);
  const grad = ctx.createRadialGradient(28,24,0,32,32,32);
  grad.addColorStop(0,'rgba(255,255,255,0.9)');
  grad.addColorStop(0.4,`rgba(${r},${g},${b},0.95)`);
  grad.addColorStop(1,`rgba(${Math.max(0,r-80)},${Math.max(0,g-80)},${Math.max(0,b-80)},1)`);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(32,32,32,0,Math.PI*2); ctx.fill();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const MATCAP_TEXTURES = {
  chrome:     () => makeMatcapTexture('#c8d0d8'),
  gold:       () => makeMatcapTexture('#c8a430'),
  bronze:     () => makeMatcapTexture('#a06820'),
  dark_metal: () => makeMatcapTexture('#404850'),
  blue_glass: () => makeMatcapTexture('#2050a0'),
};

// ─── NORMAL MAP DATA ───────────────────────────────────────────────────────────
function makeNormalTexture(type) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#8080ff';
  ctx.fillRect(0,0,256,256);
  if (type === 'brushed') {
    ctx.strokeStyle = 'rgba(160,160,255,0.3)';
    for (let y=0; y<256; y+=2) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(256,y); ctx.stroke();
    }
  } else if (type === 'scratched') {
    ctx.strokeStyle = 'rgba(120,120,255,0.4)';
    for (let i=0; i<40; i++) {
      const x1=Math.random()*256, y1=Math.random()*256;
      const x2=x1+(Math.random()-0.5)*60, y2=y1+(Math.random()-0.5)*60;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
  } else if (type === 'leather') {
    for (let x=0; x<256; x+=16) {
      for (let y=0; y<256; y+=16) {
        const v = 120+Math.random()*40;
        ctx.fillStyle = `rgb(${v},${v},255)`;
        ctx.beginPath(); ctx.arc(x+8,y+8,6,0,Math.PI*2); ctx.fill();
      }
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4,4);
  return tex;
}

// ─── SCENE SETUP ──────────────────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const W = () => wrap.clientWidth || window.innerWidth;
const H = () => wrap.clientHeight || window.innerHeight;

// Cameras
const camOrtho = new THREE.OrthographicCamera(-2,2,2,-2,0.01,100);
camOrtho.position.set(0,0,8);
const camPersp = new THREE.PerspectiveCamera(45, W()/H(), 0.01, 100);
camPersp.position.set(0,0,8);

let usePerspective = false;
let camera = camOrtho;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W(), H());
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#111111');

// Orbit Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xffffff, 2);
spotLight.position.set(5,8,6);
spotLight.castShadow = true;
spotLight.shadow.mapSize.set(1024,1024);
scene.add(spotLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
fillLight.position.set(-5,-3,2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x8899ff, 0.5);
rimLight.position.set(0,-6,-5);
scene.add(rimLight);

// Post-processing
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

let bloomPass = new UnrealBloomPass(new THREE.Vector2(W(),H()), 0.4, 0.3, 0.85);
bloomPass.enabled = false;
composer.addPass(bloomPass);

// BokehPass requires PerspectiveCamera (needs .aspect) — always pass camPersp
let bokehPass = new BokehPass(scene, camPersp, {focus:1,aperture:0.0025,maxblur:0.01});
bokehPass.enabled = false;
composer.addPass(bokehPass);

let useComposer = false;

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentSVGString = null;
let currentShape = 'circle';
let currentDepth = 0.3;
let bevelEnabled = true;
let currentBevelThickness = 0.08;
let currentBevelSize = 0.05;
let currentBevelSegments = 8;
let currentMetalness = 0.9;
let currentRoughness = 0.15;
let currentColor = '#dcdcdc';
let currentMatcap = 'none';
let currentNormalMap = 'none';
let currentNormalScale = 1.0;
let autoRotate = true;
let svgPathCount = 0;
let pathLayerMap = [];

// Up to 6 layers
let layers = [
  {color:'#dcdcdc', zOffset:0, depthRatio:1},
  {color:'#aaaaaa', zOffset:0.05, depthRatio:0.5},
];

// Base material
let mat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(currentColor),
  metalness: currentMetalness,
  roughness: currentRoughness,
});

let meshObj = null;

// ─── ENVIRONMENT ──────────────────────────────────────────────────────────────
function setEnvironment(key) {
  if (key === 'studio') {
    // Simple studio-like env map using a PMREMGenerator + neutral scene
    const pmrem = new THREE.PMREMGenerator(renderer);
    const studioEnv = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    scene.environment = studioEnv;
    pmrem.dispose();
  } else {
    scene.environment = null;
  }
}
setEnvironment('studio');

// ─── PRESET GEOMETRY ──────────────────────────────────────────────────────────
function buildPresetGeometry(shape) {
  let geom;
  if (shape === 'circle') {
    geom = new THREE.CylinderGeometry(1,1,currentDepth,64);
    geom.rotateX(Math.PI/2);
  } else if (shape === 'square') {
    geom = new THREE.BoxGeometry(2,2,currentDepth);
  } else if (shape === 'hexagon') {
    const pts = [];
    for (let i=0;i<6;i++) {
      const a = (i*Math.PI*2/6)-Math.PI/6;
      pts.push(new THREE.Vector2(Math.cos(a),Math.sin(a)));
    }
    const shape2d = new THREE.Shape(pts);
    geom = new THREE.ExtrudeGeometry(shape2d, {
      depth:currentDepth, bevelEnabled,
      bevelThickness:currentBevelThickness, bevelSize:currentBevelSize,
      bevelSegments:currentBevelSegments
    });
    const bb = new THREE.Box3().setFromObject(new THREE.Mesh(geom));
    geom.translate(-(bb.max.x+bb.min.x)/2,-(bb.max.y+bb.min.y)/2,-currentDepth/2);
  } else if (shape === 'pentagon') {
    const pts = [];
    for (let i=0;i<5;i++) {
      const a = (i*Math.PI*2/5)-Math.PI/2;
      pts.push(new THREE.Vector2(Math.cos(a),Math.sin(a)));
    }
    const shape2d = new THREE.Shape(pts);
    geom = new THREE.ExtrudeGeometry(shape2d, {
      depth:currentDepth, bevelEnabled,
      bevelThickness:currentBevelThickness, bevelSize:currentBevelSize,
      bevelSegments:currentBevelSegments
    });
    const bb = new THREE.Box3().setFromObject(new THREE.Mesh(geom));
    geom.translate(-(bb.max.x+bb.min.x)/2,-(bb.max.y+bb.min.y)/2,-currentDepth/2);
  } else if (shape === 'shield') {
    const s = new THREE.Shape();
    s.moveTo(0,1.1);
    s.bezierCurveTo(0.8,1.0,1.0,0.6,1.0,0.3);
    s.bezierCurveTo(1.0,-0.3,0.5,-0.8,0,-1.1);
    s.bezierCurveTo(-0.5,-0.8,-1.0,-0.3,-1.0,0.3);
    s.bezierCurveTo(-1.0,0.6,-0.8,1.0,0,1.1);
    geom = new THREE.ExtrudeGeometry(s, {
      depth:currentDepth, bevelEnabled,
      bevelThickness:currentBevelThickness, bevelSize:currentBevelSize,
      bevelSegments:currentBevelSegments
    });
    const bb = new THREE.Box3().setFromObject(new THREE.Mesh(geom));
    geom.translate(-(bb.max.x+bb.min.x)/2,-(bb.max.y+bb.min.y)/2,-currentDepth/2);
  } else {
    geom = new THREE.CylinderGeometry(1,1,currentDepth,64);
    geom.rotateX(Math.PI/2);
  }
  return geom;
}

// ─── SVG GEOMETRY ─────────────────────────────────────────────────────────────

function buildSVGGeometry(svgStr) {
  const loader = new SVGLoader();
  const data = loader.parse(svgStr);
  const group = new THREE.Group();

  const validPaths = data.paths.filter(p => SVGLoader.createShapes(p).length > 0);
  if (!validPaths.length) return group;

  // Parse SVG dimensions
  const parser = new DOMParser();
  const svgEl = parser.parseFromString(svgStr, 'image/svg+xml').querySelector('svg');
  let svgW = 100, svgH = 100;
  if (svgEl) {
    const vb = svgEl.getAttribute('viewBox');
    if (vb) {
      const p = vb.trim().split(/[\s,]+/);
      svgW = parseFloat(p[2]) || 100;
      svgH = parseFloat(p[3]) || 100;
    } else {
      svgW = parseFloat(svgEl.getAttribute('width')) || 100;
      svgH = parseFloat(svgEl.getAttribute('height')) || 100;
    }
  }
  const scale = 2.0 / Math.max(svgW, svgH);
  const sDepth = currentDepth / scale;
  const maxBevel = Math.min(svgW, svgH) * 0.15;
  const sBevelT = Math.min(currentBevelThickness / scale, maxBevel);
  const sBevelS = Math.min(currentBevelSize / scale, maxBevel * 0.8);

  validPaths.forEach((path, pathIdx) => {
    const shapes = SVGLoader.createShapes(path);
    if (!shapes.length) return;
    const layerIdx = (pathLayerMap[pathIdx] !== undefined) ? pathLayerMap[pathIdx] : (pathIdx === 0 ? 0 : Math.min(1, layers.length - 1));
    const layer = layers[layerIdx] || layers[0];
    const zOff = layer.zOffset || 0;
    const pathDepth = sDepth * (layer.depthRatio || 1.0);
    const geometry = new THREE.ExtrudeGeometry(shapes, {
      depth: pathDepth, bevelEnabled,
      bevelThickness: sBevelT, bevelSize: sBevelS,
      bevelSegments: currentBevelSegments,
      curveSegments: 64,
    });
    geometry.computeVertexNormals();
    const material = new THREE.MeshStandardMaterial({
      color: new THREE.Color(layer.color),
      metalness: currentMetalness,
      roughness: currentRoughness,
      side: THREE.DoubleSide,
    });
    const m = new THREE.Mesh(geometry, material);
    m.userData.pathIdx = pathIdx;
    m.userData.layerIdx = layerIdx;
    group.add(m);
  });

  if (!group.children.length) return group;

  // Center + scale
  const bbox = new THREE.Box3().setFromObject(group);
  const center = bbox.getCenter(new THREE.Vector3());
  group.children.forEach(child => {
    const li = child.userData.layerIdx || 0;
    const layer = layers[li] || layers[0];
    child.geometry.translate(-center.x, -center.y, 0);
    child.geometry.scale(scale, -scale, scale);
    child.position.z = layer.zOffset || 0;
  });

  const bbox2 = new THREE.Box3().setFromObject(group);
  group.position.z = -(bbox2.max.z + bbox2.min.z) / 2;
  return group;
}

// ─── MESH MANAGEMENT ─────────────────────────────────────────────────────────
let mesh = null;

function clearMesh() {
  if (!mesh) return;
  scene.remove(mesh);
  if (mesh.isGroup) {
    mesh.children.forEach(c => { c.geometry?.dispose(); c.material?.dispose(); });
  } else {
    mesh.geometry?.dispose();
    mesh.material?.dispose();
  }
  mesh = null;
}

function applyMaterialParams() {
  if (!mesh) return;
  const targets = mesh.isGroup ? mesh.children : [mesh];
  targets.forEach(child => {
    if (child.material && child.material.isMeshStandardMaterial) {
      child.material.metalness = currentMetalness;
      child.material.roughness = currentRoughness;
      child.material.needsUpdate = true;
    }
  });
}

// Matcap + Normal map
let matcapTexture = null;
let normalTexture = null;

const MATCAP_URLS = {
  chrome:     'https://raw.githubusercontent.com/nidorx/matcaps/master/512/2E763A_78A0B7_B3D1CF_14F209.png',
  gold:       'https://raw.githubusercontent.com/nidorx/matcaps/master/512/E6BF3C_5A4719_977726_FCFC82.png',
  bronze:     'https://raw.githubusercontent.com/nidorx/matcaps/master/512/7B5254_E9DCC7_B19986_C8AC91.png',
  dark_metal: 'https://raw.githubusercontent.com/nidorx/matcaps/master/512/1B1B1B_999999_575757_747474.png',
  blue_glass: 'https://raw.githubusercontent.com/nidorx/matcaps/master/512/3E2335_D36A1B_8E4A2E_2842A5.png',
};

function applyMatcapAndNormal() {
  if (!mesh) return;
  const targets = mesh.isGroup ? mesh.children : (mesh.isMesh ? [mesh] : []);
  if (!targets.length) return;
  if (matcapTexture) { matcapTexture.dispose(); matcapTexture = null; }
  if (normalTexture) { normalTexture.dispose(); normalTexture = null; }

  if (currentNormalMap !== 'none') {
    normalTexture = makeNormalTexture(currentNormalMap);
  }

  if (currentMatcap !== 'none' && MATCAP_URLS[currentMatcap]) {
    new THREE.TextureLoader().load(MATCAP_URLS[currentMatcap], tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      matcapTexture = tex;
      targets.forEach(child => {
        const old = child.material;
        child.material = new THREE.MeshMatcapMaterial({
          matcap: tex,
          color: new THREE.Color(old?.color ? old.color.getHex() : 0xffffff),
          side: THREE.DoubleSide,
        });
        if (normalTexture) {
          child.material.normalMap = normalTexture;
          child.material.normalScale = new THREE.Vector2(currentNormalScale, currentNormalScale);
        }
        child.material.needsUpdate = true;
        if (old && old !== child.material) old.dispose();
      });
    });
  } else {
    targets.forEach(child => {
      const old = child.material;
      const li = child.userData?.layerIdx || 0;
      const layer = layers[li] || layers[0];
      const newMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(layer ? layer.color : currentColor),
        metalness: currentMetalness,
        roughness: currentRoughness,
        side: THREE.DoubleSide,
      });
      if (normalTexture) {
        newMat.normalMap = normalTexture;
        newMat.normalScale = new THREE.Vector2(currentNormalScale, currentNormalScale);
      }
      child.material = newMat;
      child.material.needsUpdate = true;
      if (old && old !== child.material) old.dispose();
    });
  }
}

function rebuildMesh() {
  clearMesh();
  let obj;
  if (currentSVGString) {
    obj = buildSVGGeometry(currentSVGString);
  } else {
    obj = new THREE.Mesh(buildPresetGeometry(currentShape), new THREE.MeshStandardMaterial({
      color: new THREE.Color(currentColor),
      metalness: currentMetalness,
      roughness: currentRoughness,
    }));
  }
  if (!obj) return;
  mesh = obj;
  scene.add(mesh);
  const bbox = new THREE.Box3().setFromObject(mesh);
  const center = bbox.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  controls.update();
  // Re-apply matcap/normal after rebuild
  if (currentMatcap !== 'none' || currentNormalMap !== 'none') {
    applyMatcapAndNormal();
  }
}

// ─── LAYER UI ────────────────────────────────────────────────────────────────
function buildLayerUI() {
  const listEl = document.getElementById('layer-list');
  listEl.innerHTML = '';

  layers.forEach((layer, i) => {
    const block = document.createElement('div');
    block.style.cssText = 'margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);';
    block.innerHTML = `
      <div class="row" style="margin-bottom:4px;">
        <label style="font-weight:bold;">Layer ${i+1}</label>
        <input type="color" value="${layer.color}" data-layer="${i}" data-prop="color" style="width:24px;height:18px;border:none;background:none;cursor:pointer;padding:0;"/>
        ${i >= 2 ? `<button data-remove="${i}" class="btn" style="padding:1px 5px;font-size:9px;margin-left:4px;">✕</button>` : ''}
      </div>
      <div class="row">
        <label>Z Offset</label>
        <span class="val" id="z-val-${i}">${layer.zOffset.toFixed(2)}</span>
      </div>
      <input type="range" min="-1" max="2" step="0.02" value="${layer.zOffset}" data-layer="${i}" data-prop="zOffset" style="width:100%;accent-color:var(--accent);margin-bottom:4px;"/>
      <div class="row">
        <label>Depth ×</label>
        <span class="val" id="dr-val-${i}">${layer.depthRatio.toFixed(2)}</span>
      </div>
      <input type="range" min="0.1" max="3" step="0.05" value="${layer.depthRatio}" data-layer="${i}" data-prop="depthRatio" style="width:100%;accent-color:var(--accent);"/>
    `;
    block.querySelector('[data-prop="color"]').addEventListener('input', e => {
      layers[parseInt(e.target.dataset.layer)].color = e.target.value;
      rebuildMesh();
    });
    block.querySelector('[data-prop="zOffset"]').addEventListener('input', e => {
      const li = parseInt(e.target.dataset.layer);
      layers[li].zOffset = parseFloat(e.target.value);
      document.getElementById(`z-val-${li}`).textContent = layers[li].zOffset.toFixed(2);
      rebuildMesh();
    });
    block.querySelector('[data-prop="depthRatio"]').addEventListener('input', e => {
      const li = parseInt(e.target.dataset.layer);
      layers[li].depthRatio = parseFloat(e.target.value);
      document.getElementById(`dr-val-${li}`).textContent = layers[li].depthRatio.toFixed(2);
      rebuildMesh();
    });
    const removeBtn = block.querySelector('[data-remove]');
    if (removeBtn) removeBtn.addEventListener('click', e => {
      layers.splice(parseInt(e.target.dataset.remove), 1);
      buildLayerUI();
      rebuildMesh();
    });
    listEl.appendChild(block);
  });
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
let animating = true;
const AUTO_ROTATE_SPEED = 0.005;

function animate() {
  if (!animating) return;
  requestAnimationFrame(animate);
  controls.update();
  if (autoRotate && mesh) mesh.rotation.y += AUTO_ROTATE_SPEED;
  if (bloomPass.enabled || bokehPass.enabled) {
    composer.render();
  } else {
    renderer.render(scene, camera);
  }
}
animate();

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(v, d = 2) { return Number(v).toFixed(d); }
function bindSlider(id, valId, setter, digits = 2) {
  const slider = document.getElementById(id);
  const valEl = document.getElementById(valId);
  if (!slider) return;
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    if (valEl) valEl.textContent = fmt(v, digits);
    setter(v);
  });
}

// ─── EVENT LISTENERS ─────────────────────────────────────────────────────────

// Upload
document.getElementById('svg-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    if (file.name.endsWith('.svg')) {
      currentSVGString = ev.target.result;
    } else {
      // PNG: reset SVG, use shape preset with color from image (future: PNG emboss)
      currentSVGString = null;
    }
    rebuildMesh();
  };
  reader.readAsText(file);
});

document.getElementById('btn-clear-svg').addEventListener('click', () => {
  currentSVGString = null;
  document.getElementById('svg-input').value = '';
  rebuildMesh();
});

// Shape presets
document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentShape = btn.dataset.shape;
    if (!currentSVGString) rebuildMesh();
  });
});

// Geometry sliders
bindSlider('depth', 'depth-val', v => { currentDepth = v; rebuildMesh(); });
bindSlider('bevel-thickness', 'bevel-thickness-val', v => { currentBevelThickness = v; if (bevelEnabled) rebuildMesh(); }, 3);
bindSlider('bevel-size', 'bevel-size-val', v => { currentBevelSize = v; if (bevelEnabled) rebuildMesh(); }, 3);

document.getElementById('bevel-toggle').addEventListener('change', e => {
  bevelEnabled = e.target.checked;
  document.getElementById('bevel-controls').style.display = bevelEnabled ? '' : 'none';
  rebuildMesh();
});

// Layers
document.getElementById('btn-add-layer').addEventListener('click', () => {
  if (layers.length >= 6) return;
  layers.push({ color: ['#1a1a1a','#c8a020','#e8e0d0','#4a90d9','#888','#ccc'][layers.length] || '#888', zOffset: layers.length * 0.2, depthRatio: 1.0 });
  buildLayerUI();
});
buildLayerUI();

// Material
document.getElementById('matcap-select').addEventListener('change', e => {
  currentMatcap = e.target.value;
  applyMatcapAndNormal();
});
document.getElementById('normalmap-select').addEventListener('change', e => {
  currentNormalMap = e.target.value;
  applyMatcapAndNormal();
});
bindSlider('normalmap-scale', 'normalmap-scale-val', v => {
  currentNormalScale = v;
  if (mesh) {
    const targets = mesh.isGroup ? mesh.children : [mesh];
    targets.forEach(m => { if (m.material?.normalScale) { m.material.normalScale.set(v,v); m.material.needsUpdate = true; } });
  }
});
bindSlider('metalness', 'metalness-val', v => { currentMetalness = v; applyMaterialParams(); });
bindSlider('roughness', 'roughness-val', v => { currentRoughness = v; applyMaterialParams(); });

// Lighting
bindSlider('ambient-intensity', 'ambient-intensity-val', v => { ambientLight.intensity = v; });
bindSlider('dir-intensity', 'dir-intensity-val', v => { spotLight.intensity = v; });
bindSlider('light-x', 'light-x-val', v => { spotLight.position.x = v; }, 1);
bindSlider('light-y', 'light-y-val', v => { spotLight.position.y = v; }, 1);
bindSlider('light-z', 'light-z-val', v => { spotLight.position.z = v; }, 1);

document.getElementById('env-select').addEventListener('change', e => setEnvironment(e.target.value));

// Canvas
document.getElementById('bg-color').addEventListener('input', e => {
  scene.background = new THREE.Color(e.target.value);
});
document.getElementById('auto-rotate-toggle').addEventListener('change', e => {
  autoRotate = e.target.checked;
  controls.enabled = !autoRotate;
});
document.getElementById('perspective-toggle').addEventListener('change', e => {
  usePerspective = e.target.checked;
  if (usePerspective) {
    camera = camPersp;
    camPersp.aspect = W() / H();
    camPersp.updateProjectionMatrix();
  } else {
    camera = camOrtho;
  }
  controls.object = camera;
  controls.update();
  // rebuild composer passes with new camera
  renderPass.camera = camera;
  // BokehPass always uses camPersp (needs .aspect from PerspectiveCamera)
  bokehPass.camera = camPersp;
});
document.getElementById('canvas-preview-toggle').addEventListener('change', e => {
  // no-op placeholder for preview toggle
});

// Post FX
document.getElementById('bloom-toggle').addEventListener('change', e => {
  bloomPass.enabled = e.target.checked;
  document.getElementById('bloom-controls').style.display = e.target.checked ? '' : 'none';
  useComposer = bloomPass.enabled || bokehPass.enabled;
});
bindSlider('bloom-strength', 'bloom-strength-val', v => { bloomPass.strength = v; });
bindSlider('bloom-threshold', 'bloom-threshold-val', v => { bloomPass.threshold = v; });
bindSlider('bloom-radius', 'bloom-radius-val', v => { bloomPass.radius = v; });

// DOF (only active in perspective mode)
bindSlider('dof-focus', 'dof-focus-val', v => { bokehPass.uniforms.focus.value = v; });
bindSlider('dof-aperture', 'dof-aperture-val', v => { bokehPass.uniforms.aperture.value = v; }, 5);
bindSlider('dof-maxblur', 'dof-maxblur-val', v => { bokehPass.uniforms.maxblur.value = v; }, 3);

// Caption
document.getElementById('caption-name-input').addEventListener('input', e => {
  document.getElementById('caption-name').textContent = e.target.value;
});
document.getElementById('caption-copy-input').addEventListener('input', e => {
  document.getElementById('caption-copy').textContent = e.target.value;
});

// Export
document.getElementById('export-bg').addEventListener('change', e => {
  const v = e.target.value;
  document.getElementById('export-bg-solid-row').style.display = v === 'solid' ? '' : 'none';
  document.getElementById('export-bg-gradient-row').style.display = v === 'gradient' ? '' : 'none';
});

document.getElementById('btn-export').addEventListener('click', () => {
  if (!mesh) { alert('No model loaded.'); return; }
  animating = false;

  const size = parseInt(document.getElementById('export-size').value) || 1024;
  const bgMode = document.getElementById('export-bg').value;

  const savedBg = scene.background ? scene.background.clone() : null;
  if (bgMode === 'solid') {
    scene.background = new THREE.Color(document.getElementById('export-bg-color').value);
  } else if (bgMode === 'scene') {
    // keep current
  } else {
    scene.background = null;
  }

  renderer.setPixelRatio(1);
  renderer.setSize(size, size);
  renderer.render(scene, camera);

  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = size; finalCanvas.height = size;
  const ctx = finalCanvas.getContext('2d');

  if (bgMode === 'gradient') {
    const c1 = document.getElementById('grad-color1').value;
    const c2 = document.getElementById('grad-color2').value;
    const grad = ctx.createLinearGradient(0, 0, 0, size);
    grad.addColorStop(0, c1);
    grad.addColorStop(1, c2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
  }
  ctx.drawImage(renderer.domElement, 0, 0, size, size);

  // Caption
  const nameText = document.getElementById('caption-name-input').value.trim();
  const copyText = document.getElementById('caption-copy-input').value.trim();
  if (nameText || copyText) {
    ctx.textAlign = 'center';
    let y = size - 60;
    if (nameText) {
      ctx.font = 'bold 28px Outfit, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(nameText, size/2, y);
      y += 36;
    }
    if (copyText) {
      ctx.font = '18px Outfit, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText(copyText, size/2, y);
    }
  }

  scene.background = savedBg;
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W(), H());
  animating = true;
  animate();

  finalCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `badge-${size}x${size}.png`;
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
});

// Reset cam
document.getElementById('btn-reset-cam').addEventListener('click', () => {
  camera.position.set(0, 0, 8);
  camera.lookAt(0, 0, 0);
  camPersp.position.set(0, 0, 8);
  camPersp.lookAt(0, 0, 0);
  controls.target.set(0, 0, 0);
  controls.update();
});

// Resize
window.addEventListener('resize', () => {
  camOrtho.left = -2; camOrtho.right = 2; camOrtho.top = 2; camOrtho.bottom = -2;
  camOrtho.updateProjectionMatrix();
  camPersp.aspect = W() / H();
  camPersp.updateProjectionMatrix();
  renderer.setSize(W(), H());
  composer.setSize(W(), H());
});

// ─── MOBILE DRAWER ───────────────────────────────────────────────────────────
(function() {
  const panel = document.getElementById('panel');
  const toggle = document.getElementById('mobile-toggle');
  const backdrop = document.getElementById('drawer-backdrop');
  function openDrawer() {
    panel.classList.add('open');
    backdrop.classList.add('open');
    toggle.textContent = '✕ Close';
  }
  function closeDrawer() {
    panel.classList.remove('open');
    backdrop.classList.remove('open');
    toggle.textContent = '⚙ Controls';
  }
  toggle.addEventListener('click', () => panel.classList.contains('open') ? closeDrawer() : openDrawer());
  backdrop.addEventListener('click', closeDrawer);

  // Swipe down to close
  let startY = 0;
  panel.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive:true});
  panel.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 60) closeDrawer();
  }, {passive:true});
})();

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Force correct size after DOM is ready (fixes mobile 0-size issue)
requestAnimationFrame(() => {
  const w = W(), h = H();
  if (w > 0 && h > 0) {
    renderer.setSize(w, h);
    composer.setSize(w, h);
    camOrtho.left = -2 * (w/h); camOrtho.right = 2 * (w/h);
    camOrtho.updateProjectionMatrix();
    camPersp.aspect = w / h;
    camPersp.updateProjectionMatrix();
  }
});
rebuildMesh();
